<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RONIN — AI Product Intelligence</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          navy: '#0a0e1a',
          glass: 'rgba(15,20,35,0.72)',
          teal: { DEFAULT: '#00d4d4', dim: '#007e7e', glow: '#00d4d480' },
          crimson: { DEFAULT: '#dc143c', dim: '#8b0c25', glow: '#dc143c60' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        backdropBlur: { xs: '2px' },
      }
    }
  }
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  :root {
    --teal: #00d4d4;
    --crimson: #dc143c;
    --navy: #0a0e1a;
    --glass: rgba(15, 20, 35, 0.78);
    --glass-border: rgba(0, 212, 212, 0.18);
    --glass-border-light: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--navy);
    color: #e2e8f0;
    font-family: 'Inter', system-ui, sans-serif;
    overflow-x: hidden;
  }

  /* ── Scrollbar ─────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--teal); }

  /* ── Glass card ─────────────────────────────────────────────── */
  .glass {
    background: var(--glass);
    backdrop-filter: blur(18px) saturate(1.6);
    -webkit-backdrop-filter: blur(18px) saturate(1.6);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
  }
  .glass-light {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border-light);
    border-radius: 12px;
  }

  /* ── Glow effects ──────────────────────────────────────────── */
  .glow-teal { box-shadow: 0 0 24px var(--teal), 0 0 60px rgba(0,212,212,0.15); }
  .glow-crimson { box-shadow: 0 0 24px var(--crimson), 0 0 60px rgba(220,20,60,0.15); }
  .text-teal { color: var(--teal); }
  .text-crimson { color: var(--crimson); }
  .border-teal { border-color: var(--teal) !important; }
  .border-crimson { border-color: var(--crimson) !important; }

  /* ── Hero ──────────────────────────────────────────────────── */
  #hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #hero-bg {
    position: absolute; inset: 0;
    background-image: url('/static/samurai.jpg');
    background-size: cover;
    background-position: center 20%;
    filter: brightness(0.35) saturate(0.7);
    z-index: 0;
    transition: filter 0.6s ease;
  }
  #hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10,14,26,0.1) 0%,
      rgba(10,14,26,0.55) 60%,
      rgba(10,14,26,0.98) 100%
    );
    z-index: 1;
  }
  #hero-content { position: relative; z-index: 2; width: 100%; max-width: 780px; padding: 0 1.5rem; }

  /* ── Animated RONIN title ──────────────────────────────────── */
  .ronin-title {
    font-size: clamp(3.5rem, 12vw, 8rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    background: linear-gradient(135deg, #ffffff 0%, var(--teal) 50%, #ffffff 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  /* ── Search bar ────────────────────────────────────────────── */
  .search-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }
  #search-input {
    width: 100%;
    background: rgba(10,14,26,0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1.5px solid rgba(0,212,212,0.35);
    border-radius: 14px;
    color: #f1f5f9;
    font-size: 1.05rem;
    font-family: inherit;
    padding: 1.1rem 5rem 1.1rem 1.5rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  #search-input::placeholder { color: rgba(148,163,184,0.6); }
  #search-input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(0,212,212,0.15), 0 0 32px rgba(0,212,212,0.12);
  }
  #search-btn {
    position: absolute; right: 10px;
    background: linear-gradient(135deg, var(--teal), #0099a8);
    border: none; border-radius: 10px;
    padding: 0.6rem 1.1rem;
    cursor: pointer;
    font-size: 1.2rem;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  #search-btn:hover { transform: scale(1.08); box-shadow: 0 0 16px var(--teal); }
  #search-btn:active { transform: scale(0.97); }
  #search-btn.loading { animation: pulse-btn 1.2s ease infinite; }
  @keyframes pulse-btn {
    0%,100% { box-shadow: 0 0 8px var(--teal); }
    50% { box-shadow: 0 0 28px var(--teal), 0 0 60px rgba(0,212,212,0.3); }
  }

  /* ── Score ring ────────────────────────────────────────────── */
  .score-ring { transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: rgba(255,255,255,0.07); }
  .ring-fill {
    fill: none;
    stroke-linecap: round;
    stroke-dashoffset: 283;
    transition: stroke-dashoffset 1.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Progress log ──────────────────────────────────────────── */
  #progress-log {
    max-height: 380px;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  .log-line {
    display: flex; align-items: flex-start; gap: 0.6rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    animation: fade-in-up 0.3s ease;
    font-size: 0.82rem;
    line-height: 1.5;
  }
  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .log-icon { flex-shrink: 0; width: 1.4rem; text-align: center; }
  .log-text { color: #94a3b8; word-break: break-word; }
  .log-text.highlight { color: var(--teal); font-weight: 500; }

  /* ── Tables ────────────────────────────────────────────────── */
  .rank-table { width: 100%; border-collapse: collapse; }
  .rank-table th {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: #64748b; padding: 0.75rem 1rem; text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .rank-table td {
    padding: 0.85rem 1rem; font-size: 0.88rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }
  .rank-table tr.data-row { cursor: pointer; transition: background 0.2s; }
  .rank-table tr.data-row:hover { background: rgba(0,212,212,0.05); }
  .rank-table tr.data-row:hover td:first-child { border-left: 2px solid var(--teal); }

  /* ── Score bar ─────────────────────────────────────────────── */
  .score-bar-bg { background: rgba(255,255,255,0.07); border-radius: 999px; height: 5px; }
  .score-bar-fill { height: 5px; border-radius: 999px; transition: width 1s ease; }

  /* ── Badges ────────────────────────────────────────────────── */
  .badge {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.2rem 0.65rem; border-radius: 999px;
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em;
  }
  .badge-teal { background: rgba(0,212,212,0.15); color: var(--teal); border: 1px solid rgba(0,212,212,0.3); }
  .badge-crimson { background: rgba(220,20,60,0.15); color: #ff4d6d; border: 1px solid rgba(220,20,60,0.3); }
  .badge-amber { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
  .badge-green { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
  .badge-gray { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.2); }

  /* ── Section fade-in ───────────────────────────────────────── */
  .section-fade { animation: fade-in 0.5s ease; }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Radar chart ───────────────────────────────────────────── */
  .radar-container { display: flex; justify-content: center; }

  /* ── Product expand row ────────────────────────────────────── */
  .expand-row { display: none; }
  .expand-row.open { display: table-row; }

  /* ── History sidebar ───────────────────────────────────────── */
  #history-panel {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: 320px;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    z-index: 50;
    overflow-y: auto;
  }
  #history-panel.open { transform: translateX(0); }
  .history-item {
    padding: 0.85rem 1rem; border-radius: 10px;
    cursor: pointer; transition: background 0.2s;
    border: 1px solid transparent;
    margin-bottom: 0.5rem;
  }
  .history-item:hover { background: rgba(0,212,212,0.07); border-color: rgba(0,212,212,0.2); }

  /* ── Comparison cards ──────────────────────────────────────── */
  .comp-card {
    flex: 1; min-width: 220px; max-width: 340px;
    padding: 1.5rem; border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(15,20,35,0.7);
    backdrop-filter: blur(14px);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .comp-card.best { border-color: var(--teal); box-shadow: 0 0 24px rgba(0,212,212,0.15); }
  .comp-card.runner { border-color: rgba(245,158,11,0.4); }

  /* ── Spinner ───────────────────────────────────────────────── */
  .spinner {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2.5px solid rgba(0,212,212,0.2);
    border-top-color: var(--teal);
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Nav ───────────────────────────────────────────────────── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 40;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.9rem 1.5rem;
    background: rgba(10,14,26,0.82);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: opacity 0.4s;
  }
  .nav-logo { font-weight: 800; font-size: 1.2rem; letter-spacing: 0.1em; color: var(--teal); }

  /* ── Mobile ────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    #research-layout { flex-direction: column !important; }
    #progress-col, #result-col { width: 100% !important; }
    .comp-cards-wrap { flex-direction: column !important; align-items: stretch !important; }
    .comp-card { max-width: 100% !important; }
    #history-panel { width: 100%; }
  }

  /* ── Skeleton loader ───────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200% 100%;
    animation: skeleton-shimmer 1.4s infinite;
    border-radius: 6px;
  }
  @keyframes skeleton-shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body>

<!-- ── NAV ──────────────────────────────────────────────────────────────────── -->
<nav id="topnav">
  <span class="nav-logo">⚔ RONIN</span>
  <div style="display:flex;gap:0.75rem;align-items:center;">
    <button onclick="scrollToResults()" id="nav-results-btn"
      style="display:none;font-size:0.82rem;color:#94a3b8;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);padding:0.35rem 0.9rem;border-radius:8px;cursor:pointer;transition:color 0.2s,background 0.2s;"
      onmouseover="this.style.color='var(--teal)'" onmouseout="this.style.color='#94a3b8'">
      Results
    </button>
    <button onclick="toggleHistory()"
      style="font-size:0.82rem;color:#94a3b8;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);padding:0.35rem 0.9rem;border-radius:8px;cursor:pointer;transition:color 0.2s;"
      onmouseover="this.style.color='var(--teal)'" onmouseout="this.style.color='#94a3b8'">
      History
    </button>
  </div>
</nav>

<!-- ── HERO ──────────────────────────────────────────────────────────────────── -->
<section id="hero">
  <div id="hero-bg"></div>
  <div id="hero-overlay"></div>
  <div id="hero-content" style="text-align:center;">
    <p style="font-size:0.78rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(0,212,212,0.7);margin-bottom:0.75rem;font-weight:500;">
      AI Product Intelligence
    </p>
    <h1 class="ronin-title" style="margin-bottom:0.4rem;">RONIN</h1>
    <p style="font-size:1.05rem;color:rgba(148,163,184,0.8);margin-bottom:2.8rem;font-weight:300;letter-spacing:0.02em;">
      Multi-agent research. Ranked results. Real insights.
    </p>

    <!-- Search card -->
    <div class="glass" style="padding:1.8rem;max-width:680px;margin:0 auto;">
      <div class="search-wrapper" style="margin-bottom:0.9rem;">
        <input id="search-input" type="text"
          placeholder="Ask anything… 'best earphone under ₹3000' or paste Amazon URL"
          onkeydown="if(event.key==='Enter')doSearch()" autocomplete="off" spellcheck="false" />
        <button id="search-btn" onclick="doSearch()" title="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#0a0e1a" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;">
        <button class="suggestion-btn" onclick="setSuggestion('best TWS earbuds under 3000')">🎧 TWS under ₹3000</button>
        <button class="suggestion-btn" onclick="setSuggestion('Sony WH-1000XM5 vs Bose QC45')">⚔ Sony vs Bose</button>
        <button class="suggestion-btn" onclick="setSuggestion('best gaming mouse under 2000')">🖱 Gaming mouse ₹2000</button>
        <button class="suggestion-btn" onclick="setSuggestion('best mechanical keyboard under 5000')">⌨ Mech keyboard ₹5000</button>
      </div>
    </div>

    <p style="margin-top:1.5rem;font-size:0.76rem;color:rgba(100,116,139,0.6);letter-spacing:0.06em;">
      POWERED BY LANGGRAPH · DEEPSEEK · AMAZON · YOUTUBE
    </p>
  </div>
</section>

<style>
.suggestion-btn {
  background: rgba(0,212,212,0.07);
  border: 1px solid rgba(0,212,212,0.18);
  color: rgba(148,163,184,0.85);
  border-radius: 999px;
  padding: 0.35rem 0.85rem;
  font-size: 0.78rem;
  cursor: pointer;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  font-family: inherit;
}
.suggestion-btn:hover {
  background: rgba(0,212,212,0.15);
  color: var(--teal);
  border-color: rgba(0,212,212,0.4);
}
</style>

<!-- ── RESEARCH PANEL ──────────────────────────────────────────────────────── -->
<section id="research-section" style="display:none;padding:2rem 1.5rem;max-width:1200px;margin:0 auto;">
  <div id="research-layout" style="display:flex;gap:1.5rem;align-items:flex-start;">

    <!-- Left: progress -->
    <div id="progress-col" style="width:360px;flex-shrink:0;">
      <div class="glass" style="padding:1.25rem;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
          <h3 style="font-size:0.85rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#64748b;">
            Live Research
          </h3>
          <span id="progress-status" class="badge badge-teal" style="animation:pulse-btn 1.4s infinite;">
            <span class="spinner" style="width:10px;height:10px;border-width:1.5px;"></span> Searching
          </span>

        <div id="progress-log"></div>
      </div>
    </div>

    <!-- Right: result placeholder / result card -->
    <div id="result-col" style="flex:1;min-width:0;">
      <div id="result-skeleton">
        <div class="glass" style="padding:1.5rem;">
          <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1.25rem;">
            <div class="skeleton" style="width:90px;height:90px;border-radius:50%;flex-shrink:0;"></div>
            <div style="flex:1;">
              <div class="skeleton" style="height:20px;margin-bottom:8px;width:70%;"></div>
              <div class="skeleton" style="height:14px;margin-bottom:6px;width:40%;"></div>
              <div class="skeleton" style="height:14px;width:55%;"></div>
            </div>
          </div>
          <div class="skeleton" style="height:12px;margin-bottom:8px;"></div>
          <div class="skeleton" style="height:12px;margin-bottom:8px;width:85%;"></div>
          <div class="skeleton" style="height:12px;width:60%;"></div>
        </div>
      </div>
      <div id="result-area" style="display:none;"></div>
    </div>

  </div>
</section>

<!-- ── RESULTS (DISCOVERY MODE) ───────────────────────────────────────────── -->
<section id="results-section" style="display:none;padding:0 1.5rem 3rem;max-width:1200px;margin:0 auto;" class="section-fade">
</section>

<!-- ── HISTORY SIDEBAR ────────────────────────────────────────────────────── -->
<div id="history-backdrop"
  style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:49;backdrop-filter:blur(3px);"
  onclick="toggleHistory()"></div>

<div id="history-panel" class="glass" style="border-radius:0;border-right:none;border-top:none;border-bottom:none;padding:1.5rem;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
    <h2 style="font-size:1rem;font-weight:700;color:var(--teal);">⏳ Search History</h2>
    <button onclick="toggleHistory()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:1.3rem;">✕</button>
  </div>
  <div id="history-list">
    <p style="color:#475569;font-size:0.84rem;text-align:center;padding:1rem 0;">No history yet</p>
  </div>
</div>

<!-- ── SCRIPTS ────────────────────────────────────────────────────────────── -->
<script>
// ─── State ────────────────────────────────────────────────────────────────────
let isSearching = false;
let currentResult = null;
let expandedRow = null;

// ─── History ──────────────────────────────────────────────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem('ronin_history') || '[]'); }
  catch { return []; }
}
function saveToHistory(query, result, mode) {
  const h = getHistory();
  h.unshift({ query, result, mode, timestamp: Date.now() });
  if (h.length > 30) h.pop();
  localStorage.setItem('ronin_history', JSON.stringify(h));
  renderHistoryList();
}
function renderHistoryList() {
  const h = getHistory();
  const container = document.getElementById('history-list');
  if (!h.length) {
    container.innerHTML = '<p style="color:#475569;font-size:0.84rem;text-align:center;padding:1rem 0;">No history yet</p>';
    return;
  }
  container.innerHTML = h.map((item, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <p style="font-size:0.85rem;font-weight:500;color:#e2e8f0;margin:0 0 0.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(item.query)}</p>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span class="badge ${item.mode === 'comparison' ? 'badge-amber' : 'badge-teal'}" style="font-size:0.68rem;">${item.mode === 'comparison' ? 'Compare' : 'Discovery'}</span>
        <span style="font-size:0.72rem;color:#475569;">${timeAgo(item.timestamp)}</span>
      </div>
    </div>
  `).join('');
}
function loadHistory(i) {
  const h = getHistory();
  const item = h[i];
  if (!item) return;
  toggleHistory();
  document.getElementById('search-input').value = item.query;
  currentResult = item.result;
  showResults(item.result, item.query, true);
}
function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return Math.floor(diff/86400000) + 'd ago';
}
renderHistoryList();

// ─── Toggle history ────────────────────────────────────────────────────────────
function toggleHistory() {
  const panel = document.getElementById('history-panel');
  const backdrop = document.getElementById('history-backdrop');
  const isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
    backdrop.style.display = 'none';
  } else {
    renderHistoryList();
    panel.classList.add('open');
    backdrop.style.display = 'block';
  }
}

// ─── Search suggestions ────────────────────────────────────────────────────────
function setSuggestion(text) {
  document.getElementById('search-input').value = text;
  document.getElementById('search-input').focus();
}

// ─── Utility ──────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatINR(val) {
  if (!val) return '—';
  const num = typeof val === 'string' ? parseFloat(val.replace(/[^0-9.]/g,'')) : val;
  if (isNaN(num)) return String(val);
  return '₹' + num.toLocaleString('en-IN');
}
function scoreColor(s) {
  if (s >= 75) return '#00d4d4';
  if (s >= 55) return '#f59e0b';
  return '#ef4444';
}

// ─── Log icon helper ───────────────────────────────────────────────────────────
function logIcon(msg) {
  const m = msg.toLowerCase();
  if (m.includes('search') || m.includes('amazon')) return '🔎';
  if (m.includes('youtube') || m.includes('video')) return '📺';
  if (m.includes('review') || m.includes('sentiment')) return '🧠';
  if (m.includes('price') || m.includes('₹') || m.includes('inr')) return '💰';
  if (m.includes('rank') || m.includes('winner') || m.includes('best')) return '🏆';
  if (m.includes('compar')) return '⚖️';
  if (m.includes('fetch') || m.includes('detail') || m.includes('cached')) return '📦';
  if (m.includes('error') || m.includes('fail') || m.includes('⚠')) return '⚠️';
  if (m.includes('done') || m.includes('complet') || m.includes('✅')) return '✅';
  if (m.includes('human') || m.includes('loop')) return '⏭';
  return '▸';
}

// ─── doSearch ─────────────────────────────────────────────────────────────────
async function doSearch() {
  if (isSearching) return;
  const query = document.getElementById('search-input').value.trim();
  if (!query) { document.getElementById('search-input').focus(); return; }

  isSearching = true;
  const btn = document.getElementById('search-btn');
  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:2px;border-top-color:#0a0e1a;"></span>';

  // Show research section
  const researchSec = document.getElementById('research-section');
  const resultsSec  = document.getElementById('results-section');
  researchSec.style.display = 'block';
  resultsSec.style.display  = 'none';
  document.getElementById('result-skeleton').style.display = 'block';
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('nav-results-btn').style.display = '';

  // Reset log
  document.getElementById('progress-log').innerHTML = '';
  document.getElementById('progress-status').innerHTML =
    '<span class="spinner" style="width:10px;height:10px;border-width:1.5px;"></span> Searching';
  document.getElementById('progress-status').className = 'badge badge-teal';

  // Scroll to research section
  setTimeout(() => researchSec.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

  try {
    const resp = await fetch('/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const raw = line.slice(5).trim();
        if (!raw) continue;
        let msg;
        try { msg = JSON.parse(raw); } catch { continue; }
        handleSSE(msg, query);
      }
    }
  } catch (err) {
    appendLog('⚠️ Connection error: ' + err.message, true);
    showError(err.message);
  } finally {
    isSearching = false;
    btn.classList.remove('loading');
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#0a0e1a" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
    document.getElementById('progress-status').innerHTML = '✓ Done';
    document.getElementById('progress-status').className = 'badge badge-green';
  }
}

function handleSSE(msg, query) {
  if (msg.type === 'progress') {
    appendLog(msg.message);
  } else if (msg.type === 'result') {
    currentResult = msg.data;
    const mode = detectMode(msg.data);
    saveToHistory(query, msg.data, mode);
    showResults(msg.data, query, false);
  } else if (msg.type === 'error') {
    appendLog('⚠️ ' + msg.message, true);
    showError(msg.message);
  }
}

function detectMode(data) {
  const rec = data.final_recommendation || data;
  if (rec.mode === 'comparison' || rec.comparison_table) return 'comparison';
  return 'discovery';
}

function appendLog(text, isErr = false) {
  const log = document.getElementById('progress-log');
  const div = document.createElement('div');
  div.className = 'log-line';
  const icon = isErr ? '⚠️' : logIcon(text);
  const isHighlight = text.includes('✅') || text.includes('Selected') || text.includes('Winner') || text.includes('Ranking');
  div.innerHTML = `<span class="log-icon">${icon}</span><span class="log-text${isHighlight ? ' highlight' : ''}">${escHtml(text)}</span>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function scrollToResults() {
  document.getElementById('research-section').scrollIntoView({ behavior: 'smooth' });
}

// ─── showResults dispatcher ────────────────────────────────────────────────────
function showResults(data, query, fromHistory) {
  const mode = detectMode(data);
  const rec  = data.final_recommendation || data;

  // Hide skeleton
  document.getElementById('result-skeleton').style.display = 'none';
  document.getElementById('result-area').style.display = 'block';

  if (mode === 'comparison') {
    renderComparison(rec, data, query, fromHistory);
  } else {
    renderDiscovery(rec, data, query, fromHistory);
  }
}

// ─── DISCOVERY ────────────────────────────────────────────────────────────────
function renderDiscovery(rec, fullData, query, fromHistory) {
  const winner  = rec.winner || {};
  const ranked  = rec.ranked || [];
  const score   = Math.round((winner.combined_score || 0) * 100);
  const qScore  = Math.round((winner.quality_score  || 0) * 100);
  const pScore  = Math.round((winner.price_score    || 0) * 100);
  const conf    = winner.confidence || '—';
  const price   = formatINR(winner.price_inr || winner.price);
  const avail   = winner.availability;
  const url     = winner.url || '#';
  const name    = winner.name || 'Unknown Product';
  const benefits = winner.benefits || [];
  const losses   = winner.losses   || [];
  const why      = winner.why      || '';

  // Right column: winner card inline
  const resultArea = document.getElementById('result-area');
  resultArea.innerHTML = renderWinnerCard(winner, score, qScore, pScore, price, conf, url, name, benefits, losses, why, fromHistory);

  // Animate ring after render
  setTimeout(() => animateRing('winner-ring', score), 200);

  // Full results section
  const sec = document.getElementById('results-section');
  sec.style.display = 'block';
  sec.className = 'section-fade';
  sec.innerHTML = `
    <div style="padding-top:0.5rem;">
      <div style="margin-bottom:1.5rem;display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
        <h2 style="font-size:1.4rem;font-weight:800;margin:0;color:#f1f5f9;">All Ranked Products</h2>
        <span class="badge badge-teal">${ranked.length} products analyzed</span>
      </div>
      ${renderRankedTable(ranked, fullData)}
    </div>
  `;

  // Wire expand rows
  sec.querySelectorAll('tr.data-row').forEach(row => {
    row.addEventListener('click', () => {
      const idx = row.dataset.idx;
      const expandTr = document.getElementById('expand-' + idx);
      if (!expandTr) return;
      const isOpen = expandTr.classList.contains('open');
      // Close all
      sec.querySelectorAll('.expand-row.open').forEach(r => r.classList.remove('open'));
      if (!isOpen) expandTr.classList.add('open');
    });
  });

  if (!fromHistory) {
    setTimeout(() => sec.scrollIntoView({ behavior: 'smooth', block: 'start' }), 400);
  }
}

        ${url && url !== '#'
          ? `<a href="${escHtml(url)}" target="_blank" rel="noopener"
              style="display:inline-flex;align-items:center;gap:0.4rem;background:rgba(0,212,212,0.1);border:1px solid rgba(0,212,212,0.25);color:var(--teal);font-size:0.78rem;font-weight:600;padding:0.4rem 1rem;border-radius:8px;text-decoration:none;margin-top:auto;">
              View on Amazon ↗
            </a>`
          : ''}
      </div>
    `;
  }).join('');

  return `<div class="comp-cards-wrap" style="display:flex;flex-wrap:wrap;gap:1.25rem;margin-bottom:2rem;">${cards}</div>`;
}

function renderRadar(table) {
  // Simple SVG radar chart
  const metrics = ['Quality', 'Price Value', 'Availability', 'Confidence'];
  const colors  = ['#00d4d4', '#dc143c', '#f59e0b', '#a855f7', '#10b981'];
  const cx = 160, cy = 160, r = 120;
  const angleStep = (2 * Math.PI) / metrics.length;

  function getXY(i, val) {
    const angle = i * angleStep - Math.PI / 2;
    const rv = r * (val / 100);
    return { x: cx + rv * Math.cos(angle), y: cy + rv * Math.sin(angle) };
  }

  // Draw grid rings
  let gridRings = '';
  for (let g = 0.25; g <= 1.0; g += 0.25) {
    const pts = metrics.map((_, i) => {
      const a = i * angleStep - Math.PI / 2;
      return `${cx + r * g * Math.cos(a)},${cy + r * g * Math.sin(a)}`;
    }).join(' ');
    gridRings += `<polygon points="${pts}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>`;
  }

  // Axis lines + labels
  let axes = '';
  metrics.forEach((m, i) => {
    const a = i * angleStep - Math.PI / 2;
    const ex = cx + (r + 18) * Math.cos(a);
    const ey = cy + (r + 18) * Math.sin(a);
    const lx = cx + (r + 32) * Math.cos(a);
    const ly = cy + (r + 32) * Math.sin(a);
    axes += `<line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>`;
    axes += `<text x="${lx}" y="${ly}" fill="#64748b" font-size="10" text-anchor="middle" dominant-baseline="middle">${m}</text>`;
  });

  // Data polygons
  let polygons = '';
  table.forEach((p, pi) => {
    const vals = [
      Math.round((p.quality || 0) * 100),
      Math.round((p.price_score || 0) * 100),
      p.availability === 'In Stock' ? 90 : 40,
      Math.round(parseFloat(p.confidence || 0) * 100) || 50,
    ];
    const pts = vals.map((v, i) => { const pt = getXY(i, v); return `${pt.x},${pt.y}`; }).join(' ');
    const col = colors[pi % colors.length];
    polygons += `<polygon points="${pts}" fill="${col}" fill-opacity="0.12" stroke="${col}" stroke-width="2" stroke-opacity="0.8"/>`;
    vals.forEach((v, i) => {
      const pt = getXY(i, v);
      polygons += `<circle cx="${pt.x}" cy="${pt.y}" r="4" fill="${col}"/>`;
    });
  });

  // Legend
  const legend = table.map((p, pi) => `
    <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.78rem;color:#94a3b8;">
      <div style="width:12px;height:12px;border-radius:3px;background:${colors[pi % colors.length]};flex-shrink:0;"></div>
      ${escHtml((p.name||'').length > 30 ? (p.name||'').slice(0,30)+'…' : (p.name||''))}
    </div>
  `).join('');

  return `
    <div class="glass" style="padding:1.5rem;margin-bottom:2rem;">
      <h3 style="font-size:0.85rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#64748b;margin:0 0 1.25rem;">Score Radar</h3>
      <div style="display:flex;align-items:center;gap:2rem;flex-wrap:wrap;">
        <div class="radar-container">
          <svg width="320" height="320" viewBox="0 0 320 320" style="max-width:100%;">
            ${gridRings}${axes}${polygons}
          </svg>
        </div>
        <div style="display:flex;flex-direction:column;gap:0.6rem;">${legend}</div>
      </div>
    </div>
  `;
}

// ─── Error display ────────────────────────────────────────────────────────────
function showError(msg) {
  const resultArea = document.getElementById('result-area');
  resultArea.style.display = 'block';
  document.getElementById('result-skeleton').style.display = 'none';
  resultArea.innerHTML = `
    <div class="glass" style="padding:1.5rem;border-color:rgba(220,20,60,0.3);">
      <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;">
        <span style="font-size:1.5rem;">⚠️</span>
        <h3 style="font-size:1rem;font-weight:700;color:#ff4d6d;margin:0;">Research Failed</h3>
      </div>
      <p style="font-size:0.88rem;color:#94a3b8;margin:0;line-height:1.6;">${escHtml(msg)}</p>
    </div>
  `;
}

// ─── Score ring animation ─────────────────────────────────────────────────────
function animateRing(id, score) {
  const el = document.getElementById(id);
  if (!el) return;
  const r = 45;
  const circumference = 2 * Math.PI * r;
  const offset = circumference * (1 - score / 100);
  el.style.strokeDashoffset = offset;
}

// ─── Nav scroll effect ─────────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const nav = document.getElementById('topnav');
  if (window.scrollY > 40) {
    nav.style.opacity = '1';
  }
});
</script>
